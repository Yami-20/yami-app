appId: com.yami.app
productName: Yami
directories:
  output: dist
  buildResources: build-resources
files:
  - build/**/*
  - electron/**/*
  - node_modules/**/*
extraResources:
  - from: server.js
    to: server.js
  - from: build-resources/yt-dlp
    to: yt-dlp
    filter:
      - "**/*"
extraMetadata:
  main: electron/main.js
linux:
  target:
    - target: deb
      arch:
        - x64
  category: Audio
  extraResources:
    - from: build-resources/yt-dlp
      to: yt-dlp
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  extraResources:
    - from: build-resources/yt-dlp.exe
      to: yt-dlp.exe
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
publish:
  provider: github
  releaseType: release
