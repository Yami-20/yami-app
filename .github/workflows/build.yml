name: Build Yami

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  build-linux:
    name: Build Linux (.deb)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Download yt-dlp for Linux
        run: |
          mkdir -p build-resources
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o build-resources/yt-dlp
          chmod a+rx build-resources/yt-dlp

      - name: Build React
        run: npm run build
        env:
          CI: false

      - name: Bundle backend server
        run: npm run bundle-server

      - name: Build Electron (.deb)
        run: npx electron-builder --linux deb --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: yami-linux-deb
          path: dist/*.deb
          retention-days: 30

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Download yt-dlp for Windows
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path build-resources
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "build-resources/yt-dlp.exe"

      - name: Build React
        run: npm run build
        env:
          CI: false

      - name: Bundle backend server
        run: npm run bundle-server

      - name: List build-resources
        shell: powershell
        run: Get-ChildItem build-resources | Select-Object Name, Length

      - name: Build Electron (Windows)
        run: npx electron-builder --win nsis portable --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USE_HARD_LINKS: false

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yami-windows-exe
          path: dist/*.exe
          retention-days: 30

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
